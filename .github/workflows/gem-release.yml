name: Publish Gem

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    name: Build + Publish to RubyGems
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Publish to RubyGems
        uses: rubygems/release-gem@v1
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
